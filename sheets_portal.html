<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplePlate - Google Sheets Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 { margin-bottom: 0.5rem; }
        p { color: #8b92b4; margin-bottom: 2rem; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        a {
            display: block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        a:hover { transform: translateY(-2px); }
        .sheet-id {
            margin-top: 2rem;
            padding: 1rem;
            background: #1a1f3d;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.875rem;
            color: #8b92b4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ SimplePlate</h1>
        <p>Accès direct au Google Sheets</p>
        
        <div class="links">
            <a href="https://docs.google.com/spreadsheets/d/10AxlTkKUcSCN8dIdLx3G2esNtRUWf31CJMWucEe6aJ8/edit" target="_blank">📊 Ouvrir le Sheet complet</a>
            <a href="https://docs.google.com/spreadsheets/d/10AxlTkKUcSCN8dIdLx3G2esNtRUWf31CJMWucEe6aJ8/edit#gid=0" target="_blank">👥 Voir les Leads</a>
            <a href="https://docs.google.com/spreadsheets/d/10AxlTkKUcSCN8dIdLx3G2esNtRUWf31CJMWucEe6aJ8/edit#gid=1" target="_blank">💬 Voir les Messages</a>
        </div>
        
        <div class="sheet-id">
            Sheet ID: 10AxlTkKUcSCN8dIdLx3G2esNtRUWf31CJMWucEe6aJ8
        </div>
    </div>
</body>
</html>
