<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimplePlate - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-title">🍽️ SimplePlate</div>
    </header>

    <main class="main">
        <!-- Stats -->
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-value blue" id="stat-leads">—</div>
                <div class="stat-label">Prospects</div>
            </div>
            <div class="stat-box">
                <div class="stat-value green" id="stat-sites">0</div>
                <div class="stat-label">Sites</div>
            </div>
            <div class="stat-box">
                <div class="stat-value orange" id="stat-messages">0</div>
                <div class="stat-label">Messages</div>
            </div>
            <div class="stat-box">
                <div class="stat-value purple" id="stat-revenue">0€</div>
                <div class="stat-label">Revenus</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="card">
            <div class="card-title">Navigation</div>
            
            <div class="nav-grid">
                <a href="pages/prospects.html" class="nav-item">
                    <div class="nav-icon">🔍</div>
                    <div class="nav-label">Prospects</div>
                </a>
                
                <a href="pages/messages.html" class="nav-item">
                    <div class="nav-icon">💬</div>
                    <div class="nav-label">Messages</div>
                </a>
                
                <a href="pages/scrapy.html" class="nav-item">
                    <div class="nav-icon">🐶</div>
                    <div class="nav-label">Scrapy</div>
                </a>
                
                <a href="pages/hunter.html" class="nav-item">
                    <div class="nav-icon">🎯</div>
                    <div class="nav-label">Hunter</div>
                </a>
                
                <a href="pages/wilson.html" class="nav-item">
                    <div class="nav-icon">🏗️</div>
                    <div class="nav-label">Wilson</div>
                </a>
                
                <a href="pages/settings.html" class="nav-item">
                    <div class="nav-icon">⚙️</div>
                    <div class="nav-label">Paramètres</div>
                </a>
            </div>
        </div>

        <!-- Recent activity -->
        <div class="card">
            <div class="card-title">Activité récente</div>
            
            <div id="recent-activity">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Load dashboard data
        async function loadDashboard() {
            try {
                const data = await API.getLeads();
                
                // Update stats
                document.getElementById('stat-leads').textContent = data.total || 0;
                
                // Show recent leads
                const activityEl = document.getElementById('recent-activity');
                if (data.leads && data.leads.length > 0) {
                    const recent = data.leads.slice(0, 3);
                    activityEl.innerHTML = recent.map(lead => `
                        <div class="list-item">
                            <div class="list-item-title">${lead.nom}</div>
                            <div class="list-item-meta">${lead.type} • ${lead.ville}</div>
                        </div>
                    `).join('');
                } else {
                    UI.showEmpty('recent-activity', 'Aucune activité récente');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
