<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrapy - SimplePlate</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <a href="../index.html" class="back-btn">←</a>
        <div class="header-title">Scrapy 🐶</div>
    </header>

    <main class="main">
        <!-- Stats -->
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-value orange" id="stat-total">—</div>
                <div class="stat-label">Total leads</div>
            </div>
            <div class="stat-box">
                <div class="stat-value orange" id="stat-today">0</div>
                <div class="stat-label">Aujourd'hui</div>
            </div>
        </div>

        <!-- Search config -->
        <div class="card">
            <div class="card-title">⚙️ Nouvelle recherche</div>
            
            <div class="form-group mt-4">
                <label class="form-label">Ville</label>
                <input type="text" class="form-input" id="search-city" placeholder="Ex: Paris, Lyon...">
            </div>
            
            <div class="form-group">
                <label class="form-label">Type de business</label>
                <select class="form-select" id="search-type">
                    <option value="restaurant">Restaurant</option>
                    <option value="coiffeur">Coiffeur</option>
                    <option value="artisan">Artisan</option>
                    <option value="commerce">Commerce</option>
                </select>
            </div>
            
            <button class="btn btn-warning" onclick="startSearch()">
                🔍 Lancer la recherche
            </button>
        </div>

        <!-- Recent activity -->
        <div class="card">
            <div class="card-title">📋 Activité récente</div>
            
            <div id="activity-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script>
        async function loadActivity() {
            const data = await API.getLeads();
            
            document.getElementById('stat-total').textContent = data.total || 0;
            
            const container = document.getElementById('activity-list');
            
            if (!data.leads || data.leads.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">🔍</div>
                        <p>Aucune activité</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = data.leads.slice(0, 5).map(lead => `
                <div class="list-item">
                    <div class="list-item-title">${lead.nom}</div>
                    <div class="list-item-meta">${lead.type} • ${lead.ville} • ⭐ ${lead.note}</div>
                </div>
            `).join('');
        }
        
        function startSearch() {
            const city = document.getElementById('search-city').value;
            const type = document.getElementById('search-type').value;
            
            if (!city) {
                alert('❌ Veuillez entrer une ville');
                return;
            }
            
            alert(`🔍 Recherche lancée : ${type} à ${city}`);
        }
        
        loadActivity();
    </script>
</body>
</html>
