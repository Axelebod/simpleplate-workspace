<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramètres - SimplePlate</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <a href="../index.html" class="back-btn">←</a>
        <div class="header-title">Paramètres ⚙️</div>
    </header>

    <main class="main">
        <div class="card">
            <div class="card-title">🎨 Apparence</div>
            
            <div class="form-group mt-4">
                <label class="form-label">Thème</label>
                <select class="form-select">
                    <option>Sombre (par défaut)</option>
                    <option disabled>Clair (bientôt)</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🔔 Notifications</div>
            
            <div class="form-group mt-4">
                <label class="form-label">
                    <input type="checkbox" checked> Activer les notifications
                </label>
            </div>
        </div>

        <div class="card">
            <div class="card-title">ℹ️ À propos</div>
            
            <div class="card-text mt-2">
                <p><strong>SimplePlate Dashboard v2</strong></p>
                <p class="text-secondary mt-2">Version propre et fonctionnelle</p>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
